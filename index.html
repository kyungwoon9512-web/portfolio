<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정경운 | B2B Account Manager Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#0f172a;--accent:#3b82f6;--accent-light:#dbeafe;--success:#10b981;--success-light:#d1fae5;
  --warn:#f59e0b;--warn-light:#fef3c7;--danger:#ef4444;--danger-light:#fee2e2;--bg:#f8fafc;--surface:#fff;
  --border:#e2e8f0;--text:#0f172a;--text2:#64748b;--text3:#94a3b8;--radius:16px;--radius-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);--shadow-lg:0 4px 24px rgba(0,0,0,.06);
  --font:'DM Sans','Noto Sans KR','Noto Sans JP',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,250,252,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:700;font-size:18px;color:var(--primary);cursor:pointer;letter-spacing:-.3px;text-decoration:none}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{font-size:14px;font-weight:500;color:var(--text2);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--accent)}
.lang-toggle{display:flex;background:var(--border);border-radius:8px;padding:2px;margin-left:16px}
.lang-btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text2);font-family:var(--font)}
.lang-btn.active{background:var(--surface);color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Sections */
.section{max-width:1200px;margin:0 auto;padding:100px 32px}
.section-tag{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.section-title{font-size:36px;font-weight:700;color:var(--primary);letter-spacing:-.8px;margin-bottom:8px}
.section-sub{font-size:16px;color:var(--text2);margin-bottom:48px}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;padding-top:64px}
.hero-inner{display:grid;grid-template-columns:1.1fr .9fr;gap:64px;align-items:center;width:100%}
.hero-badge{display:inline-block;background:var(--accent-light);color:var(--accent);font-size:13px;font-weight:600;padding:6px 16px;border-radius:20px;margin-bottom:24px}
.hero h1{font-size:46px;font-weight:700;line-height:1.25;letter-spacing:-1.5px;color:var(--primary);margin-bottom:20px}
.hero h1 span{color:var(--accent)}
.hero-sub{font-size:16px;color:var(--text2);margin-bottom:8px}
.hero-career{font-size:14px;color:var(--text3);margin-bottom:32px;font-family:var(--mono)}
.hero-ctas{display:flex;gap:12px}
.btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:all .2s;text-decoration:none;display:inline-block}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

.stat-cards{display:flex;flex-direction:column;gap:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all .3s}
.stat-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.stat-num{font-size:32px;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:-1px}
.stat-label{font-size:14px;font-weight:600;color:var(--primary);margin-top:4px}
.stat-desc{font-size:13px;color:var(--text2);margin-top:4px}

/* About */
.about-text{max-width:720px;margin-bottom:64px}
.about-text p{font-size:16px;color:var(--text2);margin-bottom:16px;line-height:1.8}
.timeline-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.timeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;position:relative;transition:all .3s}
.timeline-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}

.tc-logo{width:48px;height:48px;border-radius:10px;object-fit:contain;margin-bottom:14px;background:#fff;padding:4px;border:1px solid var(--border)}
.tc-tag{display:inline-block;font-size:11px;font-weight:700;color:#fff;padding:4px 10px;border-radius:6px;margin-bottom:16px}
.tc-name{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:4px}
.tc-role{font-size:13px;color:var(--text2);margin-bottom:4px}
.tc-period{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:16px}
.tc-highlights{list-style:none;padding:0}
.tc-highlights li{font-size:13px;color:var(--text2);padding:4px 0 4px 16px;position:relative}
.tc-highlights li::before{content:"→";position:absolute;left:0;color:var(--accent);font-weight:600}
.tc-scale{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:20px;font-weight:700;color:var(--primary);font-family:var(--mono);letter-spacing:-.5px}
.next-card{border:2px dashed var(--accent);background:var(--accent-light)}
.next-card .tc-name{color:var(--accent)}

/* Experience */
.exp-company{margin-bottom:48px}
.exp-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.exp-company-name{font-size:22px;font-weight:700;color:var(--primary)}
.exp-period{font-size:14px;color:var(--text3);font-family:var(--mono)}
.exp-role{font-size:14px;color:var(--accent);font-weight:500;margin-bottom:24px}
.pari-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
.pari-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:20px}
.pari-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.pari-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.pari-label .dot{width:8px;height:8px;border-radius:50%}
.pari-label.prob{color:var(--danger)}.pari-label.prob .dot{background:var(--danger)}
.pari-label.act{color:var(--accent)}.pari-label.act .dot{background:var(--accent)}
.pari-label.res{color:var(--success)}.pari-label.res .dot{background:var(--success)}
.pari-label.ins{color:#8b5cf6}.pari-label.ins .dot{background:#8b5cf6}
.pari-text{font-size:13.5px;color:var(--text2);line-height:1.7}

/* Project */
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;cursor:pointer;transition:all .3s}
.proj-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.proj-cat{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.proj-name{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:8px}
.proj-desc{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.proj-result{font-size:14px;font-weight:600;color:var(--success);padding:8px 14px;background:var(--success-light);border-radius:8px;display:inline-block}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-content{background:var(--surface);border-radius:var(--radius);padding:40px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s}
.modal-overlay.open .modal-content{transform:translateY(0)}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text3);padding:4px 8px}
.modal-close:hover{color:var(--text)}

/* Dashboard */
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:24px;text-align:center}
.kpi-num{font-size:28px;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:-1px}
.kpi-label{font-size:13px;color:var(--text2);margin-top:4px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.dash-card-title{font-size:15px;font-weight:600;color:var(--primary);margin-bottom:20px}

.bar-chart{display:flex;align-items:flex-end;gap:24px;height:180px;padding-top:16px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{width:100%;border-radius:6px 6px 0 0;transition:height .8s ease}
.bar-label{font-size:11px;color:var(--text2);text-align:center;font-weight:500}
.bar-value{font-size:13px;font-weight:700;color:var(--primary);font-family:var(--mono)}

.collab-center{text-align:center;padding:16px 0}
.collab-hub{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:13px;margin-bottom:20px}
.collab-nodes{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.collab-node{background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px}

.career-steps{display:flex;flex-direction:column;gap:12px}
.career-step{display:flex;align-items:center;gap:16px}
.career-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.career-dot.next{background:var(--success)}
.career-info{flex:1}
.career-title{font-size:13px;font-weight:600;color:var(--primary)}
.career-desc{font-size:12px;color:var(--text2)}
.career-line{width:2px;height:16px;background:var(--border);margin-left:4px}

/* Contact */
.contact-section{text-align:center;padding:120px 32px;max-width:600px;margin:0 auto}
.contact-msg{font-size:24px;font-weight:600;color:var(--primary);line-height:1.6;margin-bottom:40px;white-space:pre-line}
.contact-info{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}
.contact-item{font-size:15px;color:var(--text2)}
.contact-item a{color:var(--accent);text-decoration:none}
.contact-btns{display:flex;gap:12px;justify-content:center}

.footer{text-align:center;padding:32px;font-size:13px;color:var(--text3);border-top:1px solid var(--border)}

/* Fade-in animation */
.fade-in{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* Responsive */
@media(max-width:1024px){
  .hero-inner{grid-template-columns:1fr;gap:40px}
  .hero h1{font-size:36px}
  .stat-cards{flex-direction:row}
  .stat-card{flex:1}
  .timeline-grid{grid-template-columns:repeat(2,1fr)}
  .pari-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .nav-links a{font-size:11px}
  .nav-links{gap:10px}
  .section{padding:64px 20px}
  .hero h1{font-size:28px}
  .stat-cards{flex-direction:column}
  .timeline-grid{grid-template-columns:1fr}
  .pari-grid{grid-template-columns:1fr}
  .proj-grid{grid-template-columns:1fr}
  .kpi-bar{grid-template-columns:repeat(2,1fr)}
  .dash-grid{grid-template-columns:1fr}
  .hero-ctas{flex-direction:column}
  .contact-btns{flex-direction:column;align-items:center}
  .contact-msg{font-size:20px}
  .modal-content .pari-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

let currentLang = 'ko';
let modalOpen = null;

function L() { return DATA[currentLang]; }

function html(strings, ...vals) {
  return strings.reduce((r, s, i) => r + s + (vals[i] ?? ''), '');
}

function renderNav() {
  const l = L();
  const ids = ['about','experience','project','dashboard','contact'];
  return html`
    <nav class="nav"><div class="nav-inner">
      <a class="nav-logo" href="#hero">${l.navLogo}</a>
      <div class="nav-links">
        ${ids.map((id, i) => `<a href="#${id}">${l.nav[i]}</a>`).join('')}
        <div class="lang-toggle">
          <button class="lang-btn ${currentLang==='ko'?'active':''}" onclick="switchLang('ko')">한국어</button>
          <button class="lang-btn ${currentLang==='ja'?'active':''}" onclick="switchLang('ja')">日本語</button>
        </div>
      </div>
    </div></nav>`;
}

function renderHero() {
  const l = L();
  return html`
    <section class="section hero" id="hero"><div class="hero-inner">
      <div>
        <span class="hero-badge">${l.hero.badge}</span>
        <h1>${l.hero.lines[0]}<br><span>${l.hero.lines[1]}</span><br>${l.hero.lines[2]}</h1>
        <p class="hero-sub">${l.hero.sub}</p>
        <p class="hero-career">${l.hero.career}</p>
        <div class="hero-ctas">
          <a href="#contact" class="btn btn-primary">${l.hero.dl}</a>
          <a href="#contact" class="btn btn-outline">${l.hero.cta}</a>
        </div>
      </div>
      <div class="stat-cards">
        ${l.stats.map(s => `<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div><div class="stat-desc">${s.desc}</div></div>`).join('')}
      </div>
    </div></section>`;
}

function renderAbout() {
  const l = L();
  return html`
    <section class="section" id="about">
      <div class="section-tag">About</div>
      <h2 class="section-title">${l.about.tlTitle ? 'About' : 'About'}</h2>
      <div class="about-text">
        <p>${l.about.p1}</p><p>${l.about.p2}</p>
        <p style="color:var(--primary);font-weight:500">${l.about.p3}</p>
      </div>
      <h3 style="font-size:20px;font-weight:700;margin-bottom:24px;color:var(--primary)">${l.about.tlTitle}</h3>
      <div class="timeline-grid">
        ${l.companies.map(c => `
          <div class="timeline-card">
            ${LOGOS[c.name] ? '<img class="tc-logo" src="'+LOGOS[c.name]+'" alt="">' : ''}<span class="tc-tag" style="background:${c.tagC}">${c.tag}</span>
            <div class="tc-name">${c.name}</div>
            <div class="tc-role">${c.role}</div>
            <div class="tc-period">${c.period} · ${c.dur}</div>
            <ul class="tc-highlights">${c.hl.map(h => `<li>${h}</li>`).join('')}</ul>
            <div class="tc-scale">${c.scale}</div>
          </div>`).join('')}
        <div class="timeline-card next-card">
          <span class="tc-tag" style="background:var(--accent)">${l.nextCard.label}</span>
          <div class="tc-name" style="font-size:22px">${l.nextCard.name}</div>
          <div class="tc-role" style="color:var(--accent);margin-top:12px;font-size:15px">${l.nextCard.desc}</div>
        </div>
      </div>
    </section>`;
}

function renderExperience() {
  const l = L();
  const pl = l.pariLabels;
  return html`
    <section class="section" id="experience">
      <div class="section-tag">Experience</div>
      <h2 class="section-title">Experience</h2>
      <p class="section-sub">PARI Framework — Problem · Action · Result · Insight</p>
      ${l.expData.map(comp => `
        <div class="exp-company">
          <div class="exp-header"><span class="exp-company-name">${comp.company}</span><span class="exp-period">${comp.period}</span></div>
          <div class="exp-role">${comp.role}</div>
          ${comp.items.map(item => `
            <div class="pari-card">
              <div class="pari-title">${item.title}</div>
              <div class="pari-grid">
                <div><div class="pari-label prob"><span class="dot"></span>${pl.p}</div><div class="pari-text">${item.p}</div></div>
                <div><div class="pari-label act"><span class="dot"></span>${pl.a}</div><div class="pari-text">${item.a}</div></div>
                <div><div class="pari-label res"><span class="dot"></span>${pl.r}</div><div class="pari-text">${item.r}</div></div>
                <div><div class="pari-label ins"><span class="dot"></span>${pl.i}</div><div class="pari-text">${item.i}</div></div>
              </div>
            </div>`).join('')}
        </div>`).join('')}
    </section>`;
}

function renderProjects() {
  const l = L();
  return html`
    <section class="section" id="project">
      <div class="section-tag">Project</div>
      <h2 class="section-title">Project</h2>
      <p class="section-sub">Account Manager ${currentLang==='ko'?'관점의 프로젝트 아카이브':'視点のプロジェクトアーカイブ'}</p>
      <div class="proj-grid">
        ${l.projects.map((p,i) => `
          <div class="proj-card" onclick="openModal(${i})">
            <div class="proj-cat">${p.cat}</div>
            <div class="proj-name">${p.name}</div>
            <div class="proj-desc">${p.desc}</div>
            <div class="proj-result">${p.result}</div>
          </div>`).join('')}
      </div>
    </section>
    <div class="modal-overlay" id="modal" onclick="closeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>`;
}

function renderDashboard() {
  const l = L();
  const d = l.dashboard;
  return html`
    <section class="section" id="dashboard">
      <div class="section-tag">Dashboard</div>
      <h2 class="section-title">Dashboard</h2>
      <p class="section-sub">${d.sub}</p>
      <div class="kpi-bar">
        ${d.kpis.map(k => `<div class="kpi-card"><div class="kpi-num">${k.num}</div><div class="kpi-label">${k.label}</div></div>`).join('')}
      </div>
      <div class="dash-grid">
        <div class="dash-card">
          <div class="dash-card-title">${d.charts.growth}</div>
          <svg width="100%" height="160" viewBox="0 0 400 160" preserveAspectRatio="xMidYMid meet">
            <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.15"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
            <polyline points="40,145 140,115 260,75 360,25" fill="url(#grad)" stroke="none"/>
            <polyline points="40,145 140,115 260,75 360,25" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="40" cy="145" r="5" fill="var(--accent)"/><circle cx="140" cy="115" r="5" fill="var(--accent)"/>
            <circle cx="260" cy="75" r="5" fill="var(--accent)"/><circle cx="360" cy="25" r="5" fill="var(--accent)"/>
            <text x="40" y="15" text-anchor="middle" fill="var(--primary)" font-size="12" font-weight="700" font-family="var(--mono)">30</text>
            <text x="140" y="15" text-anchor="middle" fill="var(--primary)" font-size="12" font-weight="700" font-family="var(--mono)">700</text>
            <text x="260" y="15" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="600">Scale</text>
            <text x="360" y="15" text-anchor="middle" fill="var(--success)" font-size="11" font-weight="600">AI</text>
          </svg>
        </div>
        <div class="dash-card">
          <div class="dash-card-title">${d.charts.cs}</div>
          <div class="bar-chart">
            ${d.csData.map(b => `<div class="bar-group"><div class="bar-value">${b.tag}</div><div class="bar" style="height:${b.value*1.6}px;background:${b.color}"></div><div class="bar-label">${b.label}</div></div>`).join('')}
          </div>
        </div>
        <div class="dash-card">
          <div class="dash-card-title">${d.charts.collab}</div>
          <div class="collab-center">
            <div class="collab-hub">${d.hubName}</div>
            <div class="collab-nodes">${d.collabNodes.map(n => `<span class="collab-node">${n}</span>`).join('')}</div>
          </div>
        </div>
        <div class="dash-card">
          <div class="dash-card-title">${d.charts.career}</div>
          <div class="career-steps">
            ${d.careerSteps.map((s,i) => `
              <div class="career-step"><div class="career-dot ${i===d.careerSteps.length-1?'next':''}"></div><div class="career-info"><div class="career-title">${s.t}</div><div class="career-desc">${s.d}</div></div></div>
              ${i < d.careerSteps.length-1 ? '<div class="career-line"></div>' : ''}`).join('')}
          </div>
        </div>
      </div>
    </section>`;
}

function render() {
  document.getElementById('app').innerHTML =
    renderNav() + renderHero() + renderAbout() + renderExperience() + renderProjects() + renderDashboard() + renderContact();

function switchLang(lang) {
  currentLang = lang;
  render();
}

function openModal(idx) {
  const l = L();
  const p = l.projects[idx];
  const pl = l.pariLabels;
  document.getElementById('modal-body').innerHTML = `
    <div class="proj-cat" style="margin-bottom:8px">${p.cat}</div>
    <h3 style="font-size:22px;font-weight:700;margin-bottom:24px;color:var(--primary)">${p.name}</h3>
    <div class="pari-grid" style="grid-template-columns:1fr 1fr">
      <div><div class="pari-label prob"><span class="dot"></span>${pl.p}</div><div class="pari-text">${p.detail.p}</div></div>
      <div><div class="pari-label act"><span class="dot"></span>${pl.a}</div><div class="pari-text">${p.detail.a}</div></div>
      <div><div class="pari-label res"><span class="dot"></span>${pl.r}</div><div class="pari-text">${p.detail.r}</div></div>
      <div><div class="pari-label ins"><span class="dot"></span>${pl.i}</div><div class="pari-text">${p.detail.i}</div></div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// Init
render();

// Scroll fade-in
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
